version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: auditinsight-postgres

    environment:
      POSTGRES_DB: AuditInsightDatabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: .
    container_name: auditinsight-backend

    depends_on:
      - postgres

    ports:
      - "${PORT}:${PORT}"

    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_PROD}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_ID}

      BREVO_API: ${BREVO_API}
      BREVO_MAIL: ${BREVO_MAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}

      SPRING_PROFILES_ACTIVE: prod
      PORT: ${PORT}


volumes:
  postgres_data: