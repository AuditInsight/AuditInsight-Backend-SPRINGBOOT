
# OAuth2 redirects — frontend routes that receive the authenticated session
oauth2.success.redirect-url=https://audit-insight-frontend.vercel.app/dashboard
oauth2.failure.redirect-url=https://audit-insight-frontend.vercel.app/log-in
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
server.forward-headers-strategy=framework

# CORS — comma-separated origins allowed to call this API (overridden per-profile, see application-dev.properties)
cors.allowed-origins=https://audit-insight-frontend.vercel.app,http://localhost:8088