
# OAuth2 redirect — after Google login, the backend appends ?token=<jwt> to this URL
oauth2.success.redirect-url=https://auditinsight-backend-springboot-production.up.railway.app/swagger-ui/index.html
server.forward-headers-strategy=framework

# CORS — comma-separated origins allowed to call this API (overridden per-profile, see application-dev.properties)
cors.allowed-origins=https://audit-insight-frontend.vercel.app,http://localhost:8088