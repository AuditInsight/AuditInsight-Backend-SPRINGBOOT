spring.application.name=AuditInsight-BACKEND-SPRINGBOOT

# Which environment's config (application-dev/production.properties) to load.
# Override with the SPRING_PROFILES_ACTIVE env var — Railway must set this to "production".
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database connectivity credentials
spring.r2dbc.url=${SPRING_DATABASE_URL}
spring.r2dbc.username=${SPRING_DATABASE_USERNAME}
spring.r2dbc.password=${SPRING_DATABASE_PASSWORD}

#flyway migration setup
spring.flyway.enabled=true
spring.flyway.url=${FLYWAY_URL}
spring.flyway.user=${SPRING_DATABASE_USERNAME}
spring.flyway.password=${SPRING_DATABASE_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# OAuth authentication credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
# redirect-uri is identical across profiles: {baseUrl} resolves from the incoming
# request itself (localhost locally, the Railway host in production)
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# JWT secret credentials
jwt.secret=${JWT_SECRET}

# Brevo email service
BREVO_API=${BREVO_API_KEY}
BREVO_MAIL=${BREVO_SENDER_EMAIL}
BREVO_SENDER_NAME=${BREVO_SENDER_NAME}


# Cloudinary  file storage
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

# Multipart upload limit (10 MB per file)
spring.webflux.multipart.max-file-size=10MB
spring.webflux.multipart.max-request-size=10MB
spring.codec.max-in-memory-size=10MB

# Server configuration
server.port=${PORT:8080}

# Swagger/OpenAPI  serve docs under /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Exchange rate API (ExchangeRate-API.com) — used to convert plan USD prices into MoMo/card charge currency
exchange.rate.api.key=${EXCHANGE_RATE_API_KEY}
exchange.rate.api.base-url=${EXCHANGE_RATE_API_BASE_URL:https://v6.exchangerate-api.com/v6}

# pawaPay Mobile Money aggregator (sandbox) — fronts MTN MoMo/Airtel Money, https://docs.pawapay.io
pawapay.api.base-url=${PAWAPAY_API_BASE_URL:https://api.sandbox.pawapay.io}
pawapay.api.token=${PAWAPAY_API_TOKEN}
pawapay.provider=${PAWAPAY_PROVIDER:MTN_MOMO_RWA}

# Flutterwave card payments
flutterwave.api.base-url=${FLUTTERWAVE_BASE_URL:https://api.flutterwave.com/v3}
flutterwave.secret-key=${FLUTTERWAVE_SECRET_KEY}
flutterwave.webhook-secret-hash=${FLUTTERWAVE_WEBHOOK_SECRET_HASH}
flutterwave.redirect-url=${FLUTTERWAVE_REDIRECT_URL}