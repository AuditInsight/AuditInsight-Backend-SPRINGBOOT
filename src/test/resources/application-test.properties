# H2 in-memory R2DBC database for integration tests
spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.r2dbc.username=sa
spring.r2dbc.password=

# Schema initialisation — create tables on startup so tests have a real schema
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql

# Disable Flyway/Liquibase if present
spring.flyway.enabled=false

# JWT — short-lived token is fine for tests
jwt.secret=test-secret-key-that-is-long-enough-for-hs256

# Dummy OAuth2 values so context starts without real credentials
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# Brevo — values are irrelevant; EmailService is mocked in tests
BREVO_API=test-api-key
BREVO_MAIL=test@auditinsight.com
BREVO_SENDER_NAME=AuditInsight-Test

server.port=0
